name: er-triage-env
version: "1.0.0"
description: >
  A real-world emergency room triage environment where an AI agent learns
  to prioritize patients by ESI urgency level across classic, ambiguous,
  and atypical clinical presentations. Designed to genuinely challenge
  frontier models with medically plausible edge cases.
observation_space:
  type: object
  model: PatientObservation
action_space:
  type: object
  model: TriageAction
reward_range: [0.0, 1.0]
tasks:
  - id: classic_presentations
    difficulty: easy
    description: Textbook ESI-mappable symptom patterns
  - id: ambiguous_cases
    difficulty: medium
    description: Multi-symptom overlapping presentations with partial credit grading
  - id: masked_presentations
    difficulty: hard
    description: Atypical edge cases — silent MI, afebrile sepsis, stroke mimics
episode_length: 10
